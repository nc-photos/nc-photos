name: np_geocoder
description: A new Flutter package project.
version: 0.0.1
homepage:
publish_to: none

environment:
  sdk: ">=3.9.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  copy_with:
    git:
      url: https://github.com/nkming2/dart-copy-with.git
      path: copy_with
      ref: copy_with-3.0.0
  flutter_localizations:
    sdk: flutter
  http: ^1.1.2
  intl: any
  kdtree:
    git:
      url: https://github.com/nc-photos/kd-tree-dart.git
      ref: 0.2.0-nc-photos-1
  logging: ^1.2.0
  np_collection:
    path: ../np_collection
  np_common:
    path: ../np_common
  np_log:
    path: ../np_log
  np_math:
    path: ../np_math
  np_string:
    path: ../np_string
  path: ^1.8.3
  path_provider: ^2.1.3
  sqlite3: ^2.3.0
  to_string:
    git:
      url: https://github.com/nkming2/dart-to-string.git
      ref: to_string-3.0.0
      path: to_string
  zstandard: ^1.5.0

dev_dependencies:
  build_runner: ^2.13.1
  copy_with_build:
    git:
      url: https://github.com/nkming2/dart-copy-with.git
      path: copy_with_build
      ref: copy_with_build-3.0.1
  dart_style: 3.1.2
  np_lints:
    path: ../np_lints
  np_log_build:
    path: ../np_log_build
  test: ^1.22.1
  to_string_build:
    git:
      url: https://github.com/nkming2/dart-to-string.git
      ref: to_string_build-3.0.1
      path: to_string_build

flutter:
  generate: true
  assets:
    - assets/
