name: np_ffi_image_editor
description: "A new Flutter FFI plugin project."
version: 0.0.1
homepage:
publish_to: none

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: ">=3.29.0 <4.0.0"

dependencies:
  ffi: ^2.1.4
  flutter:
    sdk: flutter
  google_mlkit_face_detection: ^0.13.1
  logging: ^1.2.0
  np_common:
    path: ../np_common
  np_platform_raw_image:
    path: ../np_platform_raw_image
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  dart_style: 3.1.2
  ffigen: ^19.0.0
  np_lints:
    path: ../np_lints

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
