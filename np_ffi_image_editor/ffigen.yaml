# Run with `dart run ffigen --config ffigen.yaml`.
name: NpFfiImageEditorBindings
description: |
  Bindings for `src/np_ffi_image_editor.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/src/np_ffi_image_editor_bindings_generated.dart'
headers:
  entry-points:
    - 'src/np_ffi_image_editor.h'
  include-directives:
    - 'src/np_ffi_image_editor.h'
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
