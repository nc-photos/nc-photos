name: np_platform_message_relay
description: A new Flutter plugin project.
version: 0.0.1
homepage:
publish_to: none

environment:
  sdk: ">=3.9.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  logging: ^1.2.0
  np_log:
    path: ../np_log

dev_dependencies:
  build_runner: ^2.13.1
  dart_style: 3.1.2
  np_lints:
    path: ../np_lints
  np_log_build:
    path: ../np_log_build

flutter:
  plugin:
    platforms:
      android:
        package: com.nkming.nc_photos.np_platform_message_relay
        pluginClass: NpPlatformMessageRelayPlugin
      ios:
        pluginClass: NpPlatformMessageRelayPlugin
